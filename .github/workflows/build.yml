name: Build Neovide Nativo
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: termux/package-builder:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Turbocharge Container Environment
        run: |
          # Instala ferramentas que o Skia (dentro do Neovide) exige para compilar
          apt-get update
          apt-get install -y cmake ninja-build python3 python3-pip build-essential clang binutils
          
          # Garante a estrutura do Termux
          mkdir -p output
          cp -r $GITHUB_WORKSPACE/* /home/builder/termux-packages/
          chown -R builder:builder /home/builder/termux-packages

      - name: Executar Compilação de Alta Performance
        run: |
          # Executa como builder com as variáveis de ambiente do cargo
          sudo -u builder bash -c "
            cd /home/builder/termux-packages && \
            ./build-package.sh -a aarch64 -f neovide
          "

      - name: Upload do Pacote .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: neovide-android-snap750g
          path: /home/builder/termux-packages/output/*.deb
