name: Build-Neovide
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: termux/package-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix-Permissions
        run: |
          mkdir -p /var/lib/apt/lists/partial
          chmod -R 777 /var/lib/apt/lists
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          apt-get update
          apt-get install -y cmake ninja-build python3 build-essential
          mkdir -p /home/builder/termux-packages
          cp -r $GITHUB_WORKSPACE/* /home/builder/termux-packages/
          chown -R builder:builder /home/builder/termux-packages

      - name: Build
        run: |
          sudo -u builder bash -c "cd /home/builder/termux-packages && ./build-package.sh -a aarch64 -f neovide"

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: neovide-deb
          path: /home/builder/termux-packages/output/*.deb
