name: Build Neovide Nativo
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: termux/package-builder:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Rust & Build Objects
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            /home/builder/termux-packages/packages/neovide/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Turbocharge Environment
        run: |
          # Instala as dependências como root direto
          apt-get update
          apt-get install -y cmake ninja-build python3 build-essential clang binutils
          
          # Organiza a casa
          mkdir -p output
          cp -r $GITHUB_WORKSPACE/* /home/builder/termux-packages/
          # Dá permissão total para garantir que nada trave
          chmod -R 777 /home/builder/termux-packages

      - name: Executar Compilação (Modo Root)
        run: |
          # Rodamos o script direto, sem 'su' ou 'sudo -u'
          cd /home/builder/termux-packages && ./build-package.sh -a aarch64 -f neovide

      - name: Upload do Pacote .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: neovide-android
          path: /home/builder/termux-packages/output/*.deb
